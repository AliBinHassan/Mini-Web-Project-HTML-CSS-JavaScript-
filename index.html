<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEMS TECH Billing</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header>
<h2>GEMS TECH</h2>
<p>Course Billing Dashboard</p>
</header>

<div class="form-area">

<div class="input-group">
<label>Client Name</label>
<input type="text" id="clientName" placeholder="Enter client name">
</div>

<div class="input-group">
<label>Select Courses</label>
<select id="course" multiple>

<option value="WEB DEVELOPMENT">Web Development</option>
<option value="APP DEVELOPMENT">App Development</option>
<option value="GAME DEVELOPMENT">Game Development</option>
<option value="GRAPHIC DESIGN">Graphic Design</option>
<option value="UX/UI DESIGN">UX/UI Design</option>
<option value="3D-ANIMATION">3D Animation</option>
<option value="PYTHON DEVELOPMENT">Python Development</option>
<option value="PHP DEVELOPMENT">PHP Development</option>

</select>
</div>

<div class="input-group">
<label>Custom Price (Optional)</label>
<input type="number" id="customPrice" placeholder="Enter custom price">
</div>

<button id="generateBtn">Generate Bill</button>

</div>

<div class="bill-area">
<h3>Generated Bill</h3>
<pre id="output"></pre>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
