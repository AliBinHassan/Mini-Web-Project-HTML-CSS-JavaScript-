<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Calendar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div class="header">

<button id="prev-month">❮</button>

<h2 id="month-year"></h2>

<button id="next-month">❯</button>

</div>


<div class="week-days">

<span>Sun</span>
<span>Mon</span>
<span>Tue</span>
<span>Wed</span>
<span>Thu</span>
<span>Fri</span>
<span>Sat</span>

</div>


<div class="calendar" id="calendar"></div>


<div class="stats">

<div class="stat red">
Red Days: <span id="red-count">0</span>
</div>

<div class="stat blue">
Blue Days: <span id="blue-count">0</span>
</div>

<div class="stat total">
Total Blocks: <span id="Total-count">0</span>
</div>

<div class="stat pay">
Payment: Rs <span id="Total-pay">0</span>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
